services:
  app:
    build:
      context: .
      target: app
    env_file: .env
    volumes:
      - sqlite_data:/var/www/html/database
      - storage_data:/var/www/html/storage
    restart: unless-stopped

  nginx:
    build:
      context: .
      target: nginx
    ports:
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  sqlite_data:
  storage_data:
